apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandbox-gateway.fullname" . }}
  labels:
    {{- include "sandbox-gateway.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

  selector:
    app: {{ include "sandbox-gateway.name" . }}
