backend:
  deployment:
    replicaCount: 3
    image:
      repository: "swr.cn-north-4.myhuaweicloud.com/openjiuwen/studio-server-amd64"
      tag: "0.1.3"
    extraVolumes:
      - name: localtime
        hostPath:
          path: /etc/localtime
          type: File
    extraVolumeMounts:
      - name: localtime
        mountPath: /etc/localtime
        readOnly: true

frontend:
  deployment:
    replicaCount: 2
    image:
      repository: "swr.ap-southeast-1.myhuaweicloud.com/openjiuwen-online-test/studio-server-no-https-amd64"
      tag: "0.1.3"
    extraVolumes:
      - name: localtime
        hostPath:
          path: /etc/localtime
          type: File
    extraVolumeMounts:
      - name: localtime
        mountPath: /etc/localtime
        readOnly: true
  service:
    elb:
      id: xxx

sandbox-gateway:
  deployment:
    image:
      repository: "swr.cn-north-4.myhuaweicloud.com/openjiuwen/studio-sandbox-gateway-amd64"
      tag: "0.1.3"
    extraVolumes:
      - name: localtime
        hostPath:
          path: /etc/localtime
          type: File
    extraVolumeMounts:
      - name: localtime
        mountPath: /etc/localtime
        readOnly: true

configmap:
  data:
    DB_HOST: ""
    DB_PASSWORD: ""
    REDIS_HOST: ""
    REDIS_PASSWORD: ""
    SMTP_ALIAS: ""
    SMTP_HOST: ""
    SMTP_PASSWORD: ""
    SMTP_PORT: ""
    SMTP_USER: ""
    SERVER_AES_MASTER_KEY_ENV: "xxx"
