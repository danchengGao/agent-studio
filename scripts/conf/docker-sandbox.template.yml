services:
  <<SANDBOX_GATEWAY_SERVICE>>:
    image: <<SANDBOX_GATEWAY_IMAGE>>
    pull_policy: if_not_present
    container_name: <<SANDBOX_GATEWAY_DOCKER>>
    ports:
      - "<<SANDBOX_GATEWAY_HOST_PORT>>:<<SANDBOX_GATEWAY_PORT>>"
    environment:
      - PYTHON_SANDBOX_URL=http://<<PYTHON_SERVER_SERVICE>>:<<PYTHON_SERVER_PORT>>/run
      - JS_SANDBOX_URL=http://<<JS_SERVER_SERVICE>>:<<JS_SERVER_PORT>>/run
      - ENABLE_LINUX_SANDBOX=<<ENABLE_LINUX_SANDBOX>>
    networks:
      - <<JIUWEN_NETWORK_NAME>>
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:<<SANDBOX_GATEWAY_PORT>>/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    <<PRIVILEGED_SECURITY_OPTS>>

  <<PYTHON_SERVER_SERVICE>>:
    image: <<PYTHON_SERVER_IMAGE>>
    pull_policy: if_not_present
    container_name: <<PYTHON_SERVER_DOCKER>>
    ports:
      - "<<PYTHON_SERVER_HOST_PORT>>:<<PYTHON_SERVER_PORT>>"
    networks:
      - <<JIUWEN_NETWORK_NAME>>
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:<<PYTHON_SERVER_PORT>>/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  <<JS_SERVER_SERVICE>>:
    image: <<JS_SERVER_IMAGE>>
    pull_policy: if_not_present
    container_name: <<JS_SERVER_DOCKER>>
    ports:
      - "<<JS_SERVER_HOST_PORT>>:<<JS_SERVER_PORT>>"
    networks:
      - <<JIUWEN_NETWORK_NAME>>
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:<<JS_SERVER_PORT>>/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  <<JIUWEN_NETWORK_NAME>>:
    driver: bridge
